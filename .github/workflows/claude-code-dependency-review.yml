name: Claude Code Dependency Review

on:
  workflow_call:
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
        description: GCP Workload Identity Provider for Vertex AI
      GCP_SERVICE_ACCOUNT:
        required: true
        description: GCP Service Account for Vertex AI
      ANTHROPIC_VERTEX_PROJECT_ID:
        required: true
        description: GCP project ID for Vertex AI
      CLOUD_ML_REGION:
        required: true
        description: GCP region for Vertex AI
      ACTIONS_APP_PRIVATE_KEY:
        required: false
        description: Private key for the GitHub App used to access private repositories
    inputs:
      ACTIONS_APP_ID:
        required: false
        type: string
        description: App ID for the GitHub App used to access private repositories
      node-version:
        required: false
        type: string
        default: '22'
        description: Node.js version to use for dependency installation

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      checks: read
      actions: read

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Generate token for private repositories
        if: inputs.ACTIONS_APP_ID != ''
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ inputs.ACTIONS_APP_ID }}
          private-key: ${{ secrets.ACTIONS_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Configure git for private repositories
        if: steps.app-token.outputs.token != ''
        run: |
          git config --global url."https://x-access-token:${GIT_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/"
        env:
          GIT_ACCESS_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Set up Node.js
        if: hashFiles('yarn.lock') != ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        id: install-deps
        if: hashFiles('yarn.lock') != ''
        continue-on-error: true
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Warn on failed dependency install
        if: steps.install-deps.outcome == 'failure'
        run: echo "::warning::yarn install failed — dependency review will run without node_modules. This may happen if the project uses private registries requiring authentication."

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Run Claude Code Dependency Review
        id: dependency-review
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ github.token }}
          use_vertex: "true"
          allowed_bots: "dependabot[bot], scality-renovate[bot]"
          plugin_marketplaces: https://github.com/scality/agent-hub.git
          plugins: scality-skills@scality-agent-hub
          prompt: "/review-dependency-bump REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number }}"
          claude_args: |
            --allowedTools "Read" "Grep" "WebFetch" "Bash(gh repo view *)" "Bash(gh pr view *)" "Bash(gh pr comment *)" "Bash(gh pr review *)" "Bash(gh api *)"
            --model "claude-opus-4-6"
        env:
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.ANTHROPIC_VERTEX_PROJECT_ID }}
          CLOUD_ML_REGION: ${{ secrets.CLOUD_ML_REGION }}
