name: Claude Code Review

on:
  workflow_call:
    inputs:
      skip_label:
        type: string
        description: "If this label is set on the PR, the review will be skipped"
        default: "skip-claude-review"
      model:
        type: string
        description: Claude model to use for the review
        default: claude-opus-4-6
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
        description: GCP Workload Identity Provider for Vertex AI
      GCP_SERVICE_ACCOUNT:
        required: true
        description: GCP Service Account for Vertex AI
      ANTHROPIC_VERTEX_PROJECT_ID:
        required: true
        description: GCP project ID for Vertex AI
      CLOUD_ML_REGION:
        required: true
        description: GCP region for Vertex AI

jobs:
  claude-review:
    if: ${{ !contains(github.event.pull_request.labels.*.name, inputs.skip_label) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15  # adds cost protection
    permissions:
      checks: write
      contents: read
      pull-requests: write
      id-token: write  # claude-code-action needs this to authenticate with GitHub

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Run Claude Code Review
        id: claude-review
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          use_vertex: "true"
          prompt: "/review-pr REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number }}"
          claude_args: |
            --allowedTools "Read" "Bash(git diff *)" "Bash(git log *)" "Bash(git show *)" "Bash(gh repo view *)" "Bash(gh pr view *)" "Bash(gh pr diff *)" "Bash(gh pr checks *)" "Bash(gh pr comment *)" "Bash(gh api *repos/*/pulls/*/comments*)" "Bash(gh api *issues/*/comments*)" "Bash(gh api *repos/*/check-runs*)"
            --model "${{ inputs.model }}"
        env:
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.ANTHROPIC_VERTEX_PROJECT_ID }}
          CLOUD_ML_REGION: ${{ secrets.CLOUD_ML_REGION }}
